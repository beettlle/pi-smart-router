# Monthly refresh of config/benchmark-profiles.json from checked-in leaderboard fixtures.
# PR smoke: re-ingest fixtures and assert the committed artifact stays in sync.
# Scheduled / manual refresh: regenerate profiles and open a PR when model scores change.

name: Benchmark Profile Refresh

on:
  schedule:
    # 1st of each month, 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'config/benchmark-profiles.json'
      - 'scripts/ingest-benchmark-profiles.ts'
      - 'scripts/lib/ast-tool-validation.ts'
      - 'tests/fixtures/benchmark-leaderboards/**'
      - '.github/workflows/benchmark-profile-refresh.yml'
      - 'package.json'
      - 'tests/unit/ingest-benchmark-profiles.test.ts'

permissions:
  contents: write
  pull-requests: write

jobs:
  smoke:
    if: github.event_name == 'pull_request'
    name: Fixture ingest smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify benchmark profiles from fixtures
        run: npm run routing:verify-benchmark-profiles

  refresh:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Monthly profile refresh
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture prior model scores
        run: |
          set -euo pipefail
          node --input-type=module -e "
            import { readFileSync, writeFileSync } from 'node:fs';
            const artifact = JSON.parse(readFileSync('config/benchmark-profiles.json', 'utf8'));
            writeFileSync('/tmp/benchmark-models-before.json', JSON.stringify(artifact.models, null, 2));
          "

      - name: Regenerate benchmark profiles
        run: |
          set -euo pipefail
          FREEZE_DATE="$(date -u +%Y-%m-%d)"
          npm run routing:ingest-benchmarks -- --catalog-freeze-date "$FREEZE_DATE"

      - name: Diff model scores
        id: diff
        run: |
          set -euo pipefail
          node --input-type=module -e "
            import { readFileSync, writeFileSync } from 'node:fs';
            const artifact = JSON.parse(readFileSync('config/benchmark-profiles.json', 'utf8'));
            writeFileSync('/tmp/benchmark-models-after.json', JSON.stringify(artifact.models, null, 2));
          "
          if diff -q /tmp/benchmark-models-before.json /tmp/benchmark-models-after.json > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Model scores unchanged; no PR needed."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Summary"
              echo ""
              echo "Monthly benchmark profile refresh from checked-in leaderboard fixtures."
              echo "Updates \`config/benchmark-profiles.json\` with a new \`catalog_freeze_date\` and any score changes."
              echo ""
              echo "Triggered by: \`${{ github.event_name }}\` (run [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}))."
              echo ""
              echo "## Model score diff"
              echo ""
              echo '```diff'
              diff -u /tmp/benchmark-models-before.json /tmp/benchmark-models-after.json | tail -n 80 || true
              echo '```'
              echo ""
              echo "Provenance: SWE-bench Verified, Terminal-Bench, LiveCodeBench, BFCL (fixture snapshots)."
              echo ""
              echo "🤖 Opened by \`.github/workflows/benchmark-profile-refresh.yml\`."
            } > /tmp/pr_body.md
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="bot/benchmark-profile-refresh-$(date -u +%Y-%m-%d)-${{ github.run_id }}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b "$BRANCH"
          git add config/benchmark-profiles.json
          git commit -m "chore(SP-137): refresh benchmark capability profiles" -m "Monthly ingest from leaderboard fixture snapshots with updated catalog_freeze_date and provenance metadata. Auto-generated by benchmark-profile-refresh.yml."
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: refresh benchmark capability profiles ($(date -u +%Y-%m-%d))" \
            --body-file /tmp/pr_body.md \
            --base main \
            --head "$BRANCH"
