name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). Must already exist."
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.ref.outputs.tag }}

    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract semver from tag
        id: version
        run: |
          TAG="${{ steps.ref.outputs.tag }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - name: Verify CI status for tagged commit
        id: ci_gate
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
              per_page: 30,
            });
            const ciRuns = data.workflow_runs.filter((run) => run.name === "CI");
            const success = ciRuns.some((run) => run.conclusion === "success");
            const failed = ciRuns.some((run) => run.conclusion === "failure");

            if (failed && !success) {
              core.setFailed(
                `CI failed for commit ${sha}; fix CI on main before publishing this tag.`
              );
              return;
            }

            core.setOutput("passed", success ? "true" : "false");
            if (success) {
              core.info(
                `Reusing successful CI run for ${sha}; skipping duplicate validation.`
              );
            } else {
              core.info(
                `No successful CI run for ${sha}; running full release validation.`
              );
            }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify (full CI parity)
        if: steps.ci_gate.outputs.passed != 'true'
        run: npm run verify:ci

      - name: Build
        run: npm run build

      - name: Pack smoke check
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.txt
          grep -q 'dist/index.js' /tmp/pack.txt
          grep -q 'src/index.ts' /tmp/pack.txt
          grep -q '.pi/extensions/smart-router/index.ts' /tmp/pack.txt
          grep -q 'bin/pi-smart-router.mjs' /tmp/pack.txt
          if grep -q '.pi/extensions/smart-router/node_modules' /tmp/pack.txt; then
            echo "ERROR: nested extension node_modules must not ship in the tarball"
            exit 1
          fi

      - name: CLI help smoke
        run: node bin/pi-smart-router.mjs 2>&1 | grep -q 'export telemetry-contrib'

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMSECRET }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "pi-smart-router@${VERSION}" version >/dev/null 2>&1; then
            echo "pi-smart-router@${VERSION} already on npm; skipping publish"
          elif [[ "${{ steps.ref.outputs.tag }}" == *-* ]]; then
            npm publish --access public --ignore-scripts --tag beta
          else
            npm publish --access public --ignore-scripts
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ref.outputs.tag }}"
          ARGS=(--title "pi-smart-router ${TAG}" --generate-notes)
          if [[ "${TAG}" == *-* ]]; then
            ARGS+=(--prerelease)
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${TAG} already exists; skipping create"
          else
            gh release create "${TAG}" "${ARGS[@]}"
          fi

  post_publish_smoke:
    name: Post-publish pi.dev smoke
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout smoke script
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install native build tools for better-sqlite3
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: pi install + pi.dev gallery smoke
        run: bash scripts/post-publish-pi-smoke.sh "${{ needs.release.outputs.version }}"
