name: Eval Harness Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/eval/**'
      - 'tests/eval/**'
      - '.github/workflows/eval-harness-smoke.yml'
      - 'package.json'

jobs:
  eval-harness-smoke:
    name: Eval harness smoke (fixtures, no network)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run eval harness on fixture traces
        run: npm run routing:eval-harness:smoke

      - name: Run eval harness adapter unit tests
        run: npm test -- tests/eval/twinrouterbench-adapter.test.ts tests/eval/harness-tracks.test.ts
