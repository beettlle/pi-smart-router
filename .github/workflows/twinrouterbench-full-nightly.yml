# TwinRouterBench full static-track nightly (SP-200 / #107)
#
# Advisory only: downloads the pinned question_bank, converts the full ~970-row
# track (no --limit), and runs harness + release-gates --report-only.
# Does NOT run on pull_request and is not a required status check — failures
# here must not gate PR CI or release:functional-smoke.

name: TwinRouterBench Full Nightly

on:
  schedule:
    # 06:15 UTC daily — off-peak relative to typical US business hours
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-track-report:
    name: Full static-track report-only
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Full-track pin fetch → convert → report-only
        env:
          TRB_CACHE_DIR: ${{ runner.temp }}/twinrouterbench-full
        run: npm run routing:twinrouterbench:full-track

      - name: Upload report artifacts (optional operator review)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twinrouterbench-full-track-${{ github.run_id }}
          path: ${{ runner.temp }}/twinrouterbench-full/
          if-no-files-found: ignore
          retention-days: 14
